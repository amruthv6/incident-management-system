kind = "web"
previewPath = "/"
title = "Incident Management System"
version = "1.0.0"
id = "artifacts/ims-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23531

[services.development]
run = "pnpm --filter @workspace/ims-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ims-app", "run", "build" ]
publicDir = "artifacts/ims-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23531"
BASE_PATH = "/"
